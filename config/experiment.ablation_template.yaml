# Template for ablation experiments with model + analysis + multi-seed config.
# Copy this file, rename, and adjust motif flags for specific ablations.

experiment:
  name: ablation_template
  seed: 42
  run_group: phase2_ablations

task_battery:
  tasks:
    - context_dependent_integration
    - evidence_accumulation
    - working_memory
    - perceptual_discrimination

motifs:
  normalization_gain_modulation: true
  attractor_dynamics: true
  selective_gating: true
  expansion_recoding: true

training:
  optimizer: adam
  lr: 0.003
  batch_size: 64
  epochs: 200
  steps_per_epoch: 50       # 50 gradient steps/epoch → 3,200 samples/epoch
  patience: 0               # disabled — always run full 200 epochs with cosine schedule
  lr_scheduler: cosine      # cosine annealing (options: cosine, plateau, none)

model:
  hidden_size: 256
  num_layers: 1
  cell_type: constrained_rnn
  dale_law: true
  sparse_connectivity: 0.1
  input_dim: 4     # max across 4 tasks (context_dep=4, others=2; smaller are zero-padded)
  output_dim: 1    # all tasks have output_dim=1

analysis:
  methods:
    - persistent_homology
    - rsa
    - cka
    - population_geometry
  n_components: 50
  max_homology_dim: 2
  n_permutations: 1000
  confidence_level: 0.95
  correction_method: fdr_bh

seeds:
  base_seed: 0
  n_seeds: 10
